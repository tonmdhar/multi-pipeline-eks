apiVersion: apps/v1
kind: Deployment

metadata:
  name: atlas-platform
  namespace: atlas-platform
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: atlas-platform
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "staging"
          resources:
            requests:
              cpu: 512m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
