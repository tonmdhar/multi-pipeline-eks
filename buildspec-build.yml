version: 0.2

phases:
  pre-build:
    commands:
      - echo "Logging in to ECR..."
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_REPO_URL
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:-latest}

  build:
    commands:
      - echo "Building Docker image..."
      - docker build --platform linux/amd64 -t $ECR_REPO_URL:$IMAGE_TAG .
      - docker tag $ECR_REPO_URL:$IMAGE_TAG $ECR_REPO_URL:latest

  post-build:
    commands:
      - echo "Pushing image to ECR..."
      - docker push $ECR_REPO_URL:$IMAGE_TAG
      - docker push $ECR_REPO_URL:latest
      - echo "Writing image definition..."
      - printf '{"ImageURI":"%s"}' $ECR_REPO_URL:$IMAGE_TAG > imageDetail.json

artifacts:
  files: imageDetail.json
    - imageDetail.json
    - k8s/**/*

# **Key:** `--platform linux/amd64` — from your previous project lesson. EKS nodes are x86, never build ARM.

